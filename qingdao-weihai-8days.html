<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title id="pageTitle"></title>
<style>
/* ================================================================
   Design Token System — travel-app-ui.md compliant
   ================================================================ */
:root {
  /* --- Background & Surface --- */
  --bg: #FFF8F6;
  --surface: #FFFFFF;
  --surface-soft: #FFF1EE;
  --surface-hover: #FFE8E3;
  --line-light: #F5EFEB;
  --line: #F0E8E4;

  /* --- Ink --- */
  --ink: #1A1A1A;
  --ink-secondary: #333333;
  --muted: #8C8C8C;
  --faint: #B8B8B8;

  /* --- Global Accent (Xiaohongshu Red, fixed) --- */
  --accent: #FF2442;
  --accent-dark: #E01D38;
  --accent-soft: #FFF0F2;
  --accent-glow: rgba(255,36,66,0.15);

  /* --- Auxiliary Palette --- */
  --coral: #FF6B6B;
  --peach: #FFAB76;
  --lavender: #B088F9;
  --mint: #4ECDC4;
  --gold: #F0A030;
  --warn: #E67E22;
  --jade: #2ECC71;
  --danger: #FF2442;
  --blue: #5B8DEF;

  /* --- Soft backgrounds for auxiliary --- */
  --coral-soft: #FFF0F0;
  --peach-soft: #FFF3E8;
  --lavender-soft: #F3EDFF;
  --mint-soft: #E8FBF9;
  --gold-soft: #FFF8EC;
  --warn-soft: #FFF5EB;
  --jade-soft: #EEFBF4;
  --blue-soft: #EDF3FF;

  /* --- City Accent (overridden per city via JS) --- */
  --city-accent: #FF2442;
  --city-accent-soft: #FFF0F2;

  /* --- Hero Gradient (overridden per city) --- */
  --hero-gradient: linear-gradient(135deg, #FF2442 0%, #FF6B8A 35%, #FF9A76 65%, #FFB88C 100%);
  --hero-shadow: 0 8px 40px rgba(255,36,66,0.18);

  /* --- Shadows --- */
  --shadow-xs: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.10);
  --shadow-accent: 0 4px 16px rgba(255,36,66,0.20);

  /* --- Radii --- */
  --radius-xs: 8px;
  --radius-sm: 12px;
  --radius-md: 16px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --radius-pill: 999px;

  /* --- Font Scale --- */
  --fs-xs: 11px;
  --fs-sm: 12px;
  --fs-base: 14px;
  --fs-md: 15px;
  --fs-lg: 17px;
  --fs-xl: 22px;
  --fs-2xl: 30px;
  --fs-3xl: 38px;

  /* --- Timing --- */
  --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --duration-fast: 160ms;
  --duration-base: 220ms;
  --duration-slow: 300ms;

  /* --- Layout --- */
  --max-width: 1080px;
  --content-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
}

/* ================================================================
   Reset
   ================================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--content-font);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  font-size: var(--fs-base);
  -webkit-font-smoothing: antialiased;
}

/* ================================================================
   Container
   ================================================================ */
.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 20px 16px 60px;
}

/* ================================================================
   Hero — Gradient Cover
   ================================================================ */
.hero {
  position: relative;
  background: var(--hero-gradient);
  border-radius: var(--radius-xl);
  padding: 36px 32px;
  color: #fff;
  overflow: hidden;
  box-shadow: var(--hero-shadow);
  margin-bottom: 14px;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.5;
  pointer-events: none;
}

.hero-eyebrow {
  display: inline-block;
  background: rgba(255,255,255,0.20);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 5px 14px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-sm);
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}

.hero h1 {
  font-size: var(--fs-3xl);
  font-weight: 800;
  line-height: 1.2;
  margin-bottom: 8px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.10);
  position: relative;
  z-index: 1;
}

.hero .subtitle {
  font-size: var(--fs-md);
  opacity: 0.88;
  position: relative;
  z-index: 1;
}

.hero-stats {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 20px;
  position: relative;
  z-index: 1;
}

.hero-stat-card {
  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 10px 18px;
  border-radius: var(--radius-md);
  text-align: center;
  transition: transform var(--duration-fast) var(--ease-out);
}

.hero-stat-card:hover { transform: translateY(-2px); }

.hero-stat-card .num {
  font-size: var(--fs-xl);
  font-weight: 800;
  display: block;
}

.hero-stat-card .label {
  font-size: var(--fs-xs);
  opacity: 0.80;
}

/* ================================================================
   Season Alert
   ================================================================ */
.season-alert {
  background: #FFF8EC;
  border: 1px solid #F0E0C0;
  border-radius: var(--radius-md);
  padding: 14px 18px;
  margin-bottom: 14px;
  font-size: var(--fs-sm);
  color: #8B6914;
  line-height: 1.6;
}

.season-alert strong { color: #6B4F10; }

/* ================================================================
   Control Area
   ================================================================ */
.controls {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 14px;
  margin-bottom: 14px;
}

.control-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-xs);
  border: 1px solid var(--line-light);
}

.control-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.control-card-title {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--ink);
}

.control-card-hint {
  font-size: var(--fs-xs);
  color: var(--muted);
}

/* --- Group Selector (Pill Segmented) --- */
.group-selector {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.group-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  border: none;
  border-radius: var(--radius-pill);
  background: var(--surface-soft);
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
  position: relative;
  overflow: hidden;
  padding: 0 10px;
}

.group-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), var(--coral));
  border-radius: var(--radius-pill);
  opacity: 0;
  transition: opacity 250ms var(--ease-out);
}

.group-btn span { position: relative; z-index: 1; }

.group-btn:active { transform: scale(0.96); }

.group-btn.active {
  color: #fff;
  box-shadow: var(--shadow-accent);
}

.group-btn.active::before { opacity: 1; }

/* --- Hotel Picker (Group Sheet) --- */
.hotel-picker { position: relative; }

.hotel-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  min-height: 44px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--surface-soft);
  padding: 0 14px;
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out);
}

.hotel-trigger:active { transform: scale(0.97); }

.hotel-trigger .hotel-name { font-weight: 700; }

.hotel-trigger .hotel-switch {
  background: var(--accent-soft);
  color: var(--accent-dark);
  font-size: var(--fs-xs);
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  font-weight: 600;
}

.hotel-trigger .arrow {
  display: inline-block;
  margin-left: 6px;
  font-size: 10px;
  color: var(--muted);
  transition: transform var(--duration-fast) var(--ease-out);
}

.hotel-picker.open .hotel-trigger .arrow { transform: rotate(180deg); }

.hotel-panel {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--line-light);
  max-height: 340px;
  overflow-y: auto;
  padding: 12px;
  z-index: 100;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity var(--duration-base) var(--ease-out), transform var(--duration-base) var(--ease-out);
}

.hotel-picker.open .hotel-panel {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.hotel-group-label {
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 8px 4px 6px;
}

.hotel-group-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding-bottom: 8px;
}

.hotel-option {
  padding: 10px 12px;
  border: 1px solid var(--line-light);
  border-radius: var(--radius-xs);
  background: var(--surface);
  font-size: var(--fs-sm);
  color: var(--ink-secondary);
  cursor: pointer;
  text-align: left;
  transition: background var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
}

.hotel-option:active { transform: scale(0.97); }

.hotel-option.active {
  background: var(--accent-soft);
  border-color: var(--accent);
  color: var(--accent-dark);
  font-weight: 600;
}

/* ================================================================
   Day Tabs Card
   ================================================================ */
.day-tabs-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xs);
  padding: 6px;
  margin-bottom: 14px;
  position: relative;
}

.day-tabs {
  display: flex;
  gap: 6px;
  position: relative;
}

.day-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 12px 8px 10px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-out), color var(--duration-fast) var(--ease-out);
  position: relative;
}

.day-tab:active { transform: scale(0.97); }

.day-tab.active {
  background: var(--accent-soft);
  color: var(--accent);
}

.day-tab-indicator {
  position: absolute;
  bottom: 0;
  height: 3px;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--accent), var(--coral));
  transition: left var(--duration-base) var(--ease-spring), width var(--duration-base) var(--ease-spring);
}

.day-tab .badge {
  display: inline-block;
  margin-top: 4px;
  font-size: var(--fs-xs);
  font-weight: 600;
  padding: 1px 8px;
  border-radius: var(--radius-pill);
  background: var(--surface-soft);
  color: var(--muted);
}

.day-tab.active .badge {
  background: var(--peach-soft);
  color: var(--peach);
}

/* ================================================================
   Day Panels
   ================================================================ */
.day-panel {
  display: none;
  opacity: 0;
  transform: translateY(8px);
}

.day-panel.active {
  display: block;
  animation: xhsFadeIn var(--duration-slow) var(--ease-out) forwards;
}

@keyframes xhsFadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes xhsStaggerIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ================================================================
   Cards (Xiaohongshu Card Flow)
   ================================================================ */
.card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-xs);
  margin-bottom: 14px;
  padding: 16px;
  border: 1px solid var(--line-light);
  animation: xhsStaggerIn var(--duration-slow) var(--ease-out) both;
}

/* ================================================================
   Summary Card
   ================================================================ */
.summary-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.summary-head-left {
  font-size: var(--fs-sm);
  color: var(--ink-secondary);
}

.summary-head-left strong { color: var(--ink); }

.summary-divider {
  height: 1px;
  background: var(--line-light);
  margin: 0 -16px 14px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line-light);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 14px;
}

.summary-item {
  background: var(--surface);
  text-align: center;
  padding: 14px 8px;
}

.summary-item .value {
  font-size: var(--fs-lg);
  font-weight: 800;
  color: var(--ink);
}

.summary-item .value.accent { color: var(--accent); }

.summary-item .label {
  font-size: var(--fs-xs);
  color: var(--muted);
  margin-top: 2px;
}

.summary-extra {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  font-size: var(--fs-sm);
  color: var(--ink-secondary);
}

.summary-extra strong { color: var(--ink); }

/* ================================================================
   Energy Badge
   ================================================================ */
.energy-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border-radius: var(--radius-sm);
  font-size: var(--fs-xs);
  font-weight: 700;
}

.energy-badge.high {
  background: var(--accent-soft);
  color: var(--danger);
  box-shadow: 0 2px 6px rgba(255,36,66,0.10);
}

.energy-badge.medium {
  background: var(--gold-soft);
  color: var(--warn);
  box-shadow: 0 2px 6px rgba(240,160,48,0.10);
}

.energy-badge.low {
  background: var(--jade-soft);
  color: var(--jade);
  box-shadow: 0 2px 6px rgba(46,204,113,0.10);
}

/* ================================================================
   Alert Cards
   ================================================================ */
.alert-card {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--radius-xs);
  font-size: var(--fs-sm);
  line-height: 1.6;
}

.alert-card.info {
  background: var(--blue-soft);
  border-left: 3px solid var(--blue);
  color: #1a4d8a;
}

.alert-card.warn {
  background: var(--warn-soft);
  border-left: 3px solid var(--warn);
  color: #8B5E00;
}

.alert-card.danger {
  background: var(--accent-soft);
  border-left: 3px solid var(--accent);
  color: var(--accent-dark);
}

.alert-card strong { font-weight: 700; }

/* ================================================================
   Route Map
   ================================================================ */
.route-map-card h3 {
  font-size: var(--fs-md);
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--ink);
}

.route-map-card svg {
  display: block;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
}

/* ================================================================
   Timeline
   ================================================================ */
.timeline-card h3 {
  font-size: var(--fs-md);
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--ink);
}

.timeline-list {
  position: relative;
  padding-left: 56px;
}

/* Vertical connector line */
.timeline-list::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 20px;
  width: 2px;
  background: linear-gradient(to bottom, var(--line), var(--line-light), transparent);
}

.timeline-item {
  position: relative;
  padding-bottom: 16px;
  animation: xhsStaggerIn var(--duration-slow) var(--ease-out) both;
}

.timeline-item:last-child { padding-bottom: 0; }

/* Timeline Dot */
.timeline-dot {
  position: absolute;
  left: -56px;
  top: 2px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 3px solid var(--surface);
  z-index: 1;
}

.timeline-dot::after {
  content: "";
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  opacity: 0.25;
}

.timeline-dot.start {
  background: linear-gradient(135deg, var(--mint), #3DD5C8);
}
.timeline-dot.start::after { background: var(--mint); box-shadow: 0 0 8px var(--mint); }

.timeline-dot.spot {
  background: linear-gradient(135deg, var(--accent), var(--coral));
}
.timeline-dot.spot::after { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

.timeline-dot.food {
  background: linear-gradient(135deg, var(--gold), #F5B041);
}
.timeline-dot.food::after { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

.timeline-dot.transport {
  background: linear-gradient(135deg, var(--lavender), #C49BFF);
}
.timeline-dot.transport::after { background: var(--lavender); box-shadow: 0 0 8px var(--lavender); }

.timeline-dot.hotel {
  background: linear-gradient(135deg, var(--jade), #58D68D);
}
.timeline-dot.hotel::after { background: var(--jade); box-shadow: 0 0 8px var(--jade); }

/* Time column */
.timeline-time {
  font-size: var(--fs-xs);
  color: var(--muted);
  font-family: "SF Mono", "Menlo", "Consolas", monospace;
  margin-bottom: 2px;
}

/* Content card */
.timeline-content {
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  box-shadow: var(--shadow-xs);
  border: 1px solid var(--line-light);
  transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
}

.timeline-title {
  font-size: var(--fs-base);
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}

.timeline-desc {
  font-size: var(--fs-sm);
  color: var(--ink-secondary);
  margin-bottom: 6px;
  line-height: 1.5;
}

/* ================================================================
   Tags
   ================================================================ */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}

.tag {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 2px 10px;
  border-radius: var(--radius-pill);
  font-size: var(--fs-xs);
  font-weight: 600;
}

.tag-play { background: var(--mint-soft); color: #1A9A8F; }
.tag-price { background: var(--gold-soft); color: #B07A18; }
.tag-queue { background: var(--warn-soft); color: #A85D0A; }
.tag-booking { background: var(--accent-soft); color: var(--accent-dark); }
.tag-info { background: var(--lavender-soft); color: #7C4DDB; }
.tag-free { background: var(--jade-soft); color: var(--jade); }
.tag-warn { background: var(--warn-soft); color: #A85D0A; }

/* Grade tags */
.tag-s { background: var(--accent-soft); color: var(--accent-dark); }
.tag-a { background: var(--peach-soft); color: #C06800; }
.tag-b { background: var(--blue-soft); color: #3A6BC5; }
.tag-c { background: var(--lavender-soft); color: #7C4DDB; }

/* ================================================================
   Food Card
   ================================================================ */
.food-section h3 {
  font-size: var(--fs-md);
  font-weight: 700;
  margin-bottom: 14px;
  color: var(--ink);
}

.food-item {
  padding: 14px;
  border: 1px solid var(--line-light);
  border-radius: var(--radius-sm);
  background: var(--surface);
  margin-bottom: 10px;
  position: relative;
  transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out), border-color var(--duration-fast) var(--ease-out);
}

.food-item::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--gold);
  border-radius: 3px 0 0 3px;
  opacity: 0;
  transition: opacity var(--duration-fast) var(--ease-out);
}

.food-item:hover::before { opacity: 1; }

.food-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}

.food-name {
  font-size: var(--fs-base);
  font-weight: 700;
  color: var(--ink);
}

.food-price {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
}

.food-meta {
  font-size: var(--fs-xs);
  color: var(--muted);
  margin-bottom: 4px;
}

.food-reason {
  font-size: var(--fs-sm);
  color: var(--ink-secondary);
  font-style: italic;
}

.food-dish {
  display: inline-block;
  margin-top: 8px;
  padding: 3px 10px;
  background: var(--gold-soft);
  border-radius: var(--radius-pill);
  font-size: var(--fs-xs);
  font-weight: 600;
  color: #8B6914;
}

/* ================================================================
   Two-Column Layout (Desktop)
   ================================================================ */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 300px;
  gap: 18px;
  align-items: start;
}

.sidebar {
  position: sticky;
  top: 18px;
}

.sidebar-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-xs);
  border: 1px solid var(--line-light);
  padding: 16px;
  margin-bottom: 14px;
}

.sidebar-card h3 {
  font-size: var(--fs-md);
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--ink);
}

.action-card {
  background: var(--surface-soft);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--line-light);
  transition: transform var(--duration-fast) var(--ease-out), box-shadow var(--duration-fast) var(--ease-out);
}

.action-card .action-title {
  font-size: var(--fs-sm);
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}

.action-card .action-desc {
  font-size: var(--fs-xs);
  color: var(--muted);
  line-height: 1.5;
}

.action-card .action-channel {
  font-size: var(--fs-xs);
  color: var(--faint);
  margin-top: 4px;
}

/* ================================================================
   Footer
   ================================================================ */
.footer {
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--line-light);
  padding: 16px 20px;
  text-align: center;
  color: var(--faint);
  font-size: var(--fs-xs);
  line-height: 1.6;
  margin-top: 24px;
}

/* ================================================================
   Desktop Hover (only on pointer devices)
   ================================================================ */
@media (hover: hover) and (pointer: fine) {
  .group-btn:not(.active):hover {
    background: var(--surface-hover);
    color: var(--accent);
  }

  .timeline-content:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }

  .food-item:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-sm);
    border-color: var(--gold);
  }

  .card:hover {
    box-shadow: var(--shadow-sm);
  }

  .hotel-option:not(.active):hover {
    background: var(--surface-soft);
    border-color: var(--muted);
  }

  .action-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
}

/* ================================================================
   Active press feedback for ALL buttons
   ================================================================ */
button:active, .hotel-trigger:active, .day-tab:active, .hotel-option:active {
  transform: scale(0.97);
  transition-duration: 160ms;
  transition-timing-function: var(--ease-out);
}

/* ================================================================
   Responsive — Tablet (<=920px)
   ================================================================ */
@media (max-width: 920px) {
  .controls { grid-template-columns: 1fr; }
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
}

/* ================================================================
   Responsive — Mobile (<=768px)
   ================================================================ */
@media (max-width: 768px) {
  .container { max-width: 640px; }
  .hero { padding: 28px 22px; }
  .hero h1 { font-size: var(--fs-2xl); }
  .group-selector { grid-template-columns: repeat(2, 1fr); }
  .summary-grid { grid-template-columns: repeat(2, 1fr); }
  .timeline-list { padding-left: 44px; }
}

/* ================================================================
   Responsive — Small Mobile (<=480px)
   ================================================================ */
@media (max-width: 480px) {
  .hero { padding: 22px 18px; border-radius: var(--radius-lg); }
  .hero h1 { font-size: var(--fs-xl); }
  .hero-stats { gap: 10px; }
  .hero-stat-card { padding: 8px 12px; }
  .hero-stat-card .num { font-size: var(--fs-lg); }
  .summary-head { flex-direction: column; align-items: flex-start; }
  .day-tab { padding: 10px 6px 8px; font-size: var(--fs-xs); }
  .hotel-group-options { grid-template-columns: 1fr; }
  .hotel-panel { max-height: 260px; }
  .container { padding: 0 12px 40px; }
}

/* ================================================================
   Reduced Motion
   ================================================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
  }
}
</style>

/* ================================================================
   Utility Functions
   ================================================================ */
function esc(s) {
  return String(s || "").replace(/[&<>"']/g, function(c) {
    return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" })[c];
  });
}

function formatTime(min) {
  var h = Math.floor(min / 60);
  return h + ":" + String(min % 60).padStart(2, "0");
}

function formatDuration(min) {
  var h = Math.floor(min / 60);
  if (h > 0 && min % 60 > 0) return h + "h" + (min % 60) + "min";
  if (h > 0) return h + "h";
  return min + "min";
}

function gradeTagClass(L) {
  if (L === "S") return "tag-s";
  if (L === "A") return "tag-a";
  if (L === "B") return "tag-b";
  return "tag-c";
}

/* ================================================================
   Queue Multiplier (Time-based)
   ================================================================ */
function getQueueMul(hour) {
  if (hour < 8) return 0.4;
  if (hour < 10) return 1.0;
  if (hour < 14) return 1.3;
  if (hour < 16) return 0.8;
  return 0.5;
}

/* ================================================================
   Energy Level
   ================================================================ */
function getEnergyLevel(route) {
  var tw = 0, tp = 0;
  (route.spots || []).forEach(function(k) {
    var s = SPOTS[k];
    if (s) {
      tw += s.walkKm || s.w || 0;
      tp += s.play || s.pl || 60;
    }
  });
  var load = tw * 10 + (tp / 60) * 5;
  if (route.remote || load >= 50 || (route.spots || []).length >= 4)
    return { level: "高", cls: "high" };
  if (load >= 30 || (route.spots || []).length >= 3)
    return { level: "中", cls: "medium" };
  return { level: "低", cls: "low" };
}

/* ================================================================
   Build Timeline
   ================================================================ */
function buildTimeline(group, dayIdx, hotelKey) {
  var routeList = ROUTES[group];
  if (!routeList || !routeList[dayIdx]) return { items: [], stats: {}, route: {}, hotel: {} };

  var route = routeList[dayIdx];
  var hotel = HOTELS[hotelKey];
  var cfg = GROUP_CONFIG[group] || GROUP_CONFIG.family;

  var spots = route.spots || route.sp || [];
  var startTime = route.startTime || route.st || 510;
  var curTime = startTime;
  var totalPlay = 0, totalQueue = 0, totalMove = 0, totalPrice = 0;
  var items = [];

  // Hotel departure
  var firstSpot = spots[0];
  var hotelToFirst = hotel && hotel.commute ? (hotel.commute[firstSpot] || 25) : 25;
  hotelToFirst = Math.round(hotelToFirst * (startTime < 480 ? 0.85 : startTime >= 480 && startTime < 540 ? 1.6 : 1.0));
  totalMove += hotelToFirst;
  items.push({
    time: formatTime(curTime),
    title: "从" + (hotel ? hotel.name : "酒店") + "出发",
    desc: "前往今日首站 — " + (SPOTS[firstSpot] ? SPOTS[firstSpot].name || SPOTS[firstSpot].n : firstSpot) + "，交通约" + hotelToFirst + "分钟",
    tags: [{ text: "约" + hotelToFirst + "min", cls: "tag-play" }],
    dot: "start"
  });
  curTime += hotelToFirst;

  for (var i = 0; i < spots.length; i++) {
    var spotKey = spots[i];
    var spot = SPOTS[spotKey];
    if (!spot) continue;

    var hour = Math.floor(curTime / 60);
    var qMul = getQueueMul(hour);
    var queueTime = Math.round(((spot.queue || spot.q || 0) * (cfg.queueMul || cfg.qm || 1.0)) * qMul);
    var playTime = Math.round(((spot.play || spot.pl || 60) * (cfg.playMul || cfg.pm || 1.0)));

    // Booking reminder
    if (spot.booking && (spot.booking.required || spot.booking.r)) {
      items.push({
        time: formatTime(curTime),
        title: "预约提醒：" + (spot.name || spot.n),
        desc: (spot.booking.note || "") + (spot.booking.items ? " · " + spot.booking.items : ""),
        tags: [{ text: "需预约", cls: "tag-booking" }],
        dot: "transport",
        booking: spot.booking
      });
    }

    // Queue entry
    if (queueTime > 0) {
      var queueTags = [
        { text: "排队约" + queueTime + "min", cls: gradeTagClass(spot.level || spot.L || "C") },
        { text: spot.price || spot.p > 0 ? (spot.price || spot.p) + "元" : "免费", cls: (spot.price || spot.p) > 0 ? "tag-price" : "tag-free" }
      ];
      items.push({
        time: formatTime(curTime),
        title: (spot.name || spot.n) + " · 排队入场",
        desc: spot.queueNote || spot.qn || "",
        tags: queueTags,
        dot: "transport",
        tip: spot.earlyNote || spot.en || null,
        fastTrack: (spot.level === "S" || spot.L === "S") ? "S级景区，早到可大幅缩短排队时间" : null
      });
      curTime += queueTime;
      totalQueue += queueTime;
    }

    // Play
    var playDesc = "建议游玩" + playTime + "分钟";
    if (spot.highlightRoute || spot.hr) playDesc += " · 精华路线：" + (spot.highlightRoute || spot.hr);
    if (spot.walkKm || spot.w) {
      var km = spot.walkKm || spot.w;
      if (km >= 3) playDesc += " · 较长步行路线，注意体力";
    }
    var playTags = [
      { text: "游玩" + playTime + "min", cls: "tag-play" },
      { text: (spot.price || spot.p) > 0 ? (spot.price || spot.p) + "元" : "免费", cls: (spot.price || spot.p) > 0 ? "tag-price" : "tag-free" }
    ];
    items.push({
      time: formatTime(curTime),
      title: spot.name || spot.n,
      desc: playDesc,
      tags: playTags,
      dot: "spot",
      tip: spot.earlyNote || spot.en || null,
      transport: spot.innerTransport || spot.tr || null,
      booking: (spot.booking && (spot.booking.required || spot.booking.r)) ? spot.booking : null
    });
    curTime += playTime;
    totalPlay += playTime;
    totalPrice += spot.price || spot.p || 0;

    // Movement to next spot
    if (i < spots.length - 1) {
      var nextKey = spots[i + 1];
      var distKey1 = spotKey + "-" + nextKey;
      var distKey2 = nextKey + "-" + spotKey;
      var dist = (DISTANCES && (DISTANCES[distKey1] || DISTANCES[distKey2])) || { dist: 2, time: 15 };
      var moveTime = dist.time || dist.t || 15;
      totalMove += moveTime;

      // Lunch insertion
      if ((group === "family" || group === "explore") && curTime >= 720 && curTime <= 810) {
        var lunchMin = cfg.lunchMin || cfg.ln || 60;
        items.push({
          time: formatTime(curTime),
          title: "午餐",
          desc: "预留" + lunchMin + "分钟用餐时间，建议选择离下一站近的餐厅",
          tags: [{ text: formatDuration(lunchMin), cls: "tag-play" }],
          dot: "food"
        });
        curTime += lunchMin;
      }

      items.push({
        time: formatTime(curTime),
        title: "前往 " + (SPOTS[nextKey] ? SPOTS[nextKey].name || SPOTS[nextKey].n : nextKey),
        desc: "移动距离约" + (dist.dist || dist.d || 2) + "km，建议公交/打车",
        tags: [{ text: "约" + moveTime + "min", cls: "tag-play" }],
        dot: "transport"
      });
      curTime += moveTime;
    }
  }

  // Return to hotel
  var lastSpot = spots[spots.length - 1];
  var returnTime = hotel && hotel.commute ? (hotel.commute[lastSpot] || 30) : 30;
  returnTime = Math.round(returnTime * (curTime >= 1020 ? 0.85 : 1.0));
  totalMove += returnTime;
  items.push({
    time: formatTime(curTime),
    title: "返回酒店",
    desc: "预计 " + formatTime(curTime + returnTime) + " 回到酒店",
    tags: [{ text: "约" + returnTime + "min", cls: "tag-play" }],
    dot: "hotel"
  });

  var energy = getEnergyLevel(route);
  var totalMin = totalPlay + totalQueue + totalMove;

  return {
    items: items,
    stats: {
      totalPlay: totalPlay,
      totalQueue: totalQueue,
      totalMove: totalMove,
      totalPrice: totalPrice,
      totalMin: totalMin,
      endTime: curTime + returnTime,
      energy: energy,
      spotCount: spots.length
    },
    route: route,
    hotel: hotel
  };
}

/* ================================================================
   Build Route Map SVG
   ================================================================ */
function buildRouteMap(timelineResult) {
  var route = timelineResult.route;
  var spots = route.spots || route.sp || [];
  var count = spots.length;
  if (count === 0) return "";

  var nodeH = 65;
  var topPad = 35;
  var bottomPad = 20;
  var totalH = topPad + count * nodeH + bottomPad;
  var nodeX = 30;
  var labelX = 50;
  var svgW = 440;

  var cityColor = CITY_ACCENT || "#FF2442";
  var colors = [cityColor, "#1d4ed8", "#2d6a4f", "#b35900", "#7c3aed", "#c5a059", "#5B8DEF"];

  var svg = '<svg viewBox="0 0 ' + (svgW + 20) + ' ' + totalH + '" xmlns="http://www.w3.org/2000/svg">';
  svg += '<rect x="0" y="0" width="' + (svgW + 20) + '" height="' + totalH + '" rx="12" fill="var(--bg)" stroke="var(--line-light)" stroke-width="1"/>';

  // Connector lines
  for (var i = 0; i < count - 1; i++) {
    var y1 = topPad + i * nodeH + 12;
    var y2 = topPad + (i + 1) * nodeH + 12;
    svg += '<line x1="' + nodeX + '" y1="' + y1 + '" x2="' + nodeX + '" y2="' + y2 + '" stroke="var(--line)" stroke-width="2" stroke-dasharray="4,4"/>';
  }

  // Start node
  svg += '<circle cx="' + nodeX + '" cy="' + (topPad - 20) + '" r="6" fill="var(--jade)"/>';
  svg += '<text x="' + labelX + '" y="' + (topPad - 16) + '" fill="var(--jade)" font-size="10" font-weight="600">酒店出发</text>';

  // Spot nodes
  for (var i = 0; i < count; i++) {
    var key = spots[i];
    var spot = SPOTS[key];
    if (!spot) continue;
    var y = topPad + i * nodeH + 12;
    var c = colors[i % colors.length];
    var isCore = (spot.play || spot.pl || 0) >= 180;
    var r = isCore ? 16 : 14;

    svg += '<circle cx="' + nodeX + '" cy="' + y + '" r="' + r + '" fill="' + c + '" stroke="' + (isCore ? '#E67E22' : '#fff') + '" stroke-width="' + (isCore ? 3 : 2) + '"/>';
    svg += '<text x="' + nodeX + '" y="' + (y + 5) + '" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">' + (i + 1) + '</text>';
    svg += '<text x="' + labelX + '" y="' + (y - 2) + '" fill="var(--ink)" font-size="13" font-weight="600">' + esc(spot.name || spot.n) + '</text>';

    var pText = (spot.price || spot.p) > 0 ? (spot.price || spot.p) + "元" : "免费";
    var wText = (spot.walkKm || spot.w) > 0 ? "步行约" + (spot.walkKm || spot.w) + "km" : "";
    var coreMark = isCore ? " 核心景点" : "";
    svg += '<text x="' + labelX + '" y="' + (y + 18) + '" fill="' + (isCore ? '#E67E22' : 'var(--muted)') + '" font-size="10" font-weight="' + (isCore ? 600 : 400) + '">游玩' + (spot.play || spot.pl || 60) + 'min · ' + pText + (wText ? " · " + wText : "") + coreMark + '</text>';
  }

  svg += "</svg>";
  return svg;
}

/* ================================================================
   Render Day Panel
   ================================================================ */
function renderDayPanel(group, dayIdx, hotelKey) {
  var result = buildTimeline(group, dayIdx, hotelKey);
  if (!result || !result.items || result.items.length === 0) {
    return '<div class="card" style="text-align:center;padding:40px 20px;color:var(--muted);">暂无当日路线数据</div>';
  }

  var items = result.items;
  var stats = result.stats;
  var route = result.route;
  var foodKey = route.foodDay || route.fd || ("day" + (dayIdx + 1));
  var foodList = FOOD ? (FOOD[foodKey] || FOOD["day" + (dayIdx + 1)] || []) : [];
  var totalHours = (stats.totalMin / 60).toFixed(1);
  var playHours = (stats.totalPlay / 60).toFixed(1);
  var moveHours = (stats.totalMove / 60).toFixed(1);
  var energy = stats.energy;
  var spots = route.spots || route.sp || [];

  var html = "";

  // --- Summary Card ---
  html += '<div class="card" style="animation-delay:0ms">';
  html += '<div class="summary-grid">';
  html += '<div class="summary-item"><span class="value accent">' + totalHours + 'h</span><span class="label">总预估时长</span></div>';
  html += '<div class="summary-item"><span class="value">' + playHours + 'h</span><span class="label">纯游玩</span></div>';
  html += '<div class="summary-item"><span class="value">' + moveHours + 'h</span><span class="label">交通移动</span></div>';
  html += '<div class="summary-item"><span class="value">' + spots.length + '个</span><span class="label">景点数量</span></div>';
  html += '</div>';
  html += '<div class="summary-divider"></div>';
  html += '<div class="summary-extra">';
  html += '<span>排队总计 <strong>' + formatDuration(stats.totalQueue) + '</strong> · 门票 <strong>¥' + stats.totalPrice + '</strong> · 预计 <strong>' + formatTime(stats.endTime) + '</strong> 回到酒店</span>';
  html += '<span class="energy-badge ' + energy.cls + '">体力等级：' + energy.level + '</span>';
  html += '</div>';

  // Alert cards
  if (route.remote) {
    var firstSpotName = SPOTS[spots[0]] ? (SPOTS[spots[0]].name || SPOTS[spots[0]].n) : spots[0];
    var commuteMin = result.hotel && result.hotel.commute ? (result.hotel.commute[spots[0]] || 60) : 60;
    html += '<div class="alert-card info">远郊日提示：今日为' + esc(firstSpotName) + '深度游，距市区约' + Math.round(commuteMin) + '分钟，建议尽早出发。</div>';
  }
  if (energy.level === "高") {
    html += '<div class="alert-card warn">高体力消耗日：今日路线强度较大，建议穿着舒适运动鞋。</div>';
  }
  html += '</div>';

  // --- Route Map Card ---
  html += '<div class="card route-map-card" style="animation-delay:40ms">';
  html += '<h3>今日路线概览</h3>';
  html += buildRouteMap(result);
  html += '</div>';

  // --- Timeline Card ---
  html += '<div class="card timeline-card" style="animation-delay:80ms">';
  html += '<h3>行程时间轴</h3>';
  html += '<div class="timeline-list">';

  var staggerDelay = 0;
  items.forEach(function(item) {
    var delay = Math.min(staggerDelay, 400);
    html += '<div class="timeline-item" style="animation-delay:' + delay + 'ms">';
    html += '<div class="timeline-dot ' + (item.dot || "spot") + '"></div>';
    html += '<div class="timeline-time">' + esc(item.time) + '</div>';
    html += '<div class="timeline-content">';
    html += '<div class="timeline-title">' + esc(item.title) + '</div>';
    html += '<div class="timeline-desc">' + esc(item.desc) + '</div>';
    html += '<div class="tags">';
    (item.tags || []).forEach(function(t) {
      html += '<span class="tag ' + (t.cls || "tag-info") + '">' + esc(t.text) + '</span>';
    });
    html += '</div>';

    if (item.tip) {
      html += '<div class="alert-card info" style="margin-top:8px;padding:8px 12px;">' + esc(item.tip) + '</div>';
    }
    if (item.fastTrack) {
      html += '<div class="alert-card info" style="margin-top:8px;padding:8px 12px;">' + esc(item.fastTrack) + '</div>';
    }
    if (item.transport) {
      html += '<div class="alert-card info" style="margin-top:8px;padding:8px 12px;">' + esc(item.transport) + '</div>';
    }
    if (item.warn) {
      html += '<div class="alert-card warn" style="margin-top:8px;padding:8px 12px;">' + esc(item.warn) + '</div>';
    }
    if (item.booking) {
      html += '<div class="alert-card danger" style="margin-top:8px;padding:8px 12px;">需提前预约：' + esc(item.booking.note || "") + (item.booking.items ? " · " + esc(item.booking.items) : "") + '</div>';
    }

    html += '</div>'; // timeline-content
    html += '</div>'; // timeline-item
    staggerDelay += 40;
  });

  html += '</div></div>';

  // --- Food Card ---
  if (foodList.length > 0) {
    html += '<div class="card food-section" style="animation-delay:120ms">';
    html += '<h3>美食推荐</h3>';
    foodList.forEach(function(f) {
      html += '<div class="food-item">';
      html += '<div class="food-header">';
      html += '<span class="food-name">' + esc(f.name || f.n) + '</span>';
      html += '<span class="food-price">人均 ¥' + (f.price || f.pr || 0) + '</span>';
      html += '</div>';
      html += '<div class="food-meta">' + esc(f.location || f.loc || "") + '</div>';
      html += '<div class="food-reason">' + esc(f.reason || f.rsn || "") + '</div>';
      if (f.dish) {
        html += '<span class="food-dish">招牌：' + esc(f.dish) + '</span>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  return html;
}

/* ================================================================
   Render Sidebar Checklist
   ================================================================ */
function renderChecklist(group, hotelKey) {
  var routeList = ROUTES[group];
  if (!routeList) return "";

  var html = "";
  var seen = {};

  routeList.forEach(function(route, idx) {
    var spots = route.spots || route.sp || [];
    var dayLabel = "Day " + (idx + 1);

    spots.forEach(function(key) {
      if (seen[key]) return;
      var spot = SPOTS[key];
      if (!spot) return;
      seen[key] = true;

      if (spot.booking && (spot.booking.required || spot.booking.r)) {
        html += '<div class="action-card">';
        html += '<div class="action-title">Day ' + (idx + 1) + ' · 提前预约：' + esc(spot.name || spot.n) + '</div>';
        html += '<div class="action-desc">' + esc(spot.booking.note || "需提前预约") + '</div>';
        if (spot.booking.items) {
          html += '<div class="action-channel">渠道：' + esc(spot.booking.items) + '</div>';
        }
        html += '</div>';
      }
    });

    if (route.remote) {
      html += '<div class="action-card">';
      html += '<div class="action-title">Day ' + (idx + 1) + ' · 远郊出行</div>';
      html += '<div class="action-desc">建议早起出发，提前查看交通和天气</div>';
      html += '</div>';
    }
  });

  if (!html) {
    html = '<p style="font-size:var(--fs-sm);color:var(--muted);text-align:center;padding:10px 0;">暂无特殊准备事项</p>';
  }

  return html;
}

/* ================================================================
   Render All Panels
   ================================================================ */
function renderAllPanels(group, hotelKey) {
  var routeList = ROUTES[group];
  var panelCount = routeList ? routeList.length : 0;

  for (var i = 0; i < panelCount; i++) {
    var panel = document.getElementById("panel" + i);
    if (panel) {
      panel.innerHTML = renderDayPanel(group, i, hotelKey);
    }
  }

  // Sidebar checklist
  var checklist = document.getElementById("checklistContent");
  if (checklist) {
    checklist.innerHTML = renderChecklist(group, hotelKey);
  }
}

/* ================================================================
   Initialize Hero
   ================================================================ */
function initHero() {
  var eyebrow = document.getElementById("heroEyebrow");
  var title = document.getElementById("heroTitle");
  var subtitle = document.getElementById("heroSubtitle");
  var statsContainer = document.getElementById("heroStats");

  if (eyebrow) eyebrow.textContent = (METADATA.city || "").toUpperCase() + " · " + (METADATA.days || 3) + " DAYS";
  if (title) title.textContent = (METADATA.city || "") + " " + (METADATA.days || 3) + "日攻略";
  if (subtitle) subtitle.textContent = METADATA.subtitle || "";

  if (statsContainer && METADATA.stats) {
    var s = METADATA.stats;
    var statsHtml = "";
    statsHtml += '<div class="hero-stat-card"><span class="num">' + (s.days || 0) + '</span><span class="label">天数</span></div>';
    statsHtml += '<div class="hero-stat-card"><span class="num">' + (s.spots || 0) + '+</span><span class="label">景点</span></div>';
    statsHtml += '<div class="hero-stat-card"><span class="num">' + (s.groups || 4) + '</span><span class="label">种风格</span></div>';
    if (s.hotels) {
      statsHtml += '<div class="hero-stat-card"><span class="num">' + s.hotels + '</span><span class="label">住宿片区</span></div>';
    }
    statsContainer.innerHTML = statsHtml;
  }

  // Set page title
  var pageTitle = document.getElementById("pageTitle");
  if (pageTitle) pageTitle.textContent = (METADATA.city || "") + (METADATA.days || 3) + "日旅行规划";

  // Apply city accent
  if (CITY_ACCENT) {
    document.documentElement.style.setProperty("--city-accent", CITY_ACCENT);
    // Compute a soft version
    var r = parseInt(CITY_ACCENT.slice(1, 3), 16);
    var g = parseInt(CITY_ACCENT.slice(3, 5), 16);
    var b = parseInt(CITY_ACCENT.slice(5, 7), 16);
    var softColor = "rgba(" + r + "," + g + "," + b + ",0.10)";
    document.documentElement.style.setProperty("--city-accent-soft", softColor);
  }

  // Apply city-specific hero gradient if provided
  if (METADATA.heroGradient) {
    document.documentElement.style.setProperty("--hero-gradient", METADATA.heroGradient);
  }
}

/* ================================================================
   Initialize Hotel Picker
   ================================================================ */
function initHotelPicker() {
  var panel = document.getElementById("hotelPanel");
  if (!panel || !HOTELS) return;

  // Group hotels by area (simulate groups from data)
  var html = "";
  var groups = {};

  Object.keys(HOTELS).forEach(function(key) {
    var h = HOTELS[key];
    var name = h.name || h.n || key;
    // Use first hotel's key as default group, or try to extract a group
    var groupLabel = h.group || h.area || "住宿片区";
    if (!groups[groupLabel]) groups[groupLabel] = [];
    groups[groupLabel].push({ key: key, name: name });
  });

  Object.keys(groups).forEach(function(label) {
    html += '<div class="hotel-group-label">' + esc(label) + '</div>';
    html += '<div class="hotel-group-options">';
    groups[label].forEach(function(h) {
      html += '<button class="hotel-option" data-hotel="' + h.key + '">' + esc(h.name) + '</button>';
    });
    html += '</div>';
  });

  panel.innerHTML = html;

  // Set default
  var defaultHotel = Object.keys(HOTELS)[0];
  var hotelName = document.getElementById("hotelName");
  if (hotelName && HOTELS[defaultHotel]) {
    hotelName.textContent = HOTELS[defaultHotel].name || HOTELS[defaultHotel].n || defaultHotel;
  }
  currentHotel = defaultHotel;

  // Mark default active
  var firstOpt = panel.querySelector('.hotel-option[data-hotel="' + defaultHotel + '"]');
  if (firstOpt) firstOpt.classList.add("active");
}

/* ================================================================
   Initialize Day Tabs
   ================================================================ */
function initDayTabs() {
  var routeList = ROUTES[currentGroup];
  if (!routeList) return;

  var dayTabs = document.getElementById("dayTabs");
  var indicator = document.getElementById("dayTabIndicator");
  var panelsContainer = document.querySelector(".main-content");

  // Build tab HTML
  var tabsHtml = "";
  for (var i = 0; i < routeList.length; i++) {
    var route = routeList[i];
    var spots = route.spots || route.sp || [];
    var activeClass = i === 0 ? " active" : "";
    tabsHtml += '<button class="day-tab' + activeClass + '" data-day="' + i + '">Day ' + (i + 1) + '<span class="badge">' + spots.length + '站</span></button>';
  }
  dayTabs.innerHTML = tabsHtml;

  // Build panel containers
  // Remove existing panels
  var existingPanels = panelsContainer.querySelectorAll(".day-panel");
  existingPanels.forEach(function(p) { p.remove(); });

  // Insert panels after day-tabs-card
  var tabsCard = panelsContainer.querySelector(".day-tabs-card");
  for (var i = 0; i < routeList.length; i++) {
    var div = document.createElement("div");
    div.className = "day-panel" + (i === 0 ? " active" : "");
    div.id = "panel" + i;
    div.dataset.day = i;
    tabsCard.parentNode.insertBefore(div, tabsCard.nextSibling);
  }

  // Position indicator on first tab
  updateIndicator(dayTabs.querySelector(".day-tab.active"));
}

function updateIndicator(tab) {
  var indicator = document.getElementById("dayTabIndicator");
  if (!indicator || !tab) return;
  indicator.style.left = tab.offsetLeft + "px";
  indicator.style.width = tab.offsetWidth + "px";
}

/* ================================================================
   State
   ================================================================ */
var currentGroup = "family";
var currentHotel = null;

/* ================================================================
   Event Bindings
   ================================================================ */

// Group selector
document.getElementById("groupSelector").addEventListener("click", function(e) {
  var btn = e.target.closest(".group-btn");
  if (!btn) return;
  document.querySelectorAll(".group-btn").forEach(function(b) { b.classList.remove("active"); });
  btn.classList.add("active");
  currentGroup = btn.dataset.group;
  initDayTabs();
  renderAllPanels(currentGroup, currentHotel);
});

// Hotel picker toggle
document.getElementById("hotelTrigger").addEventListener("click", function() {
  document.getElementById("hotelPicker").classList.toggle("open");
});

// Close hotel panel on outside click
document.addEventListener("click", function(e) {
  var picker = document.getElementById("hotelPicker");
  if (!picker.classList.contains("open")) return;
  if (picker.contains(e.target)) return;
  picker.classList.remove("open");
});

// Hotel option selection
document.getElementById("hotelPanel").addEventListener("click", function(e) {
  var opt = e.target.closest(".hotel-option");
  if (!opt) return;

  document.querySelectorAll(".hotel-option").forEach(function(o) { o.classList.remove("active"); });
  opt.classList.add("active");

  currentHotel = opt.dataset.hotel;
  var hotelName = document.getElementById("hotelName");
  if (hotelName) hotelName.textContent = opt.textContent;

  document.getElementById("hotelPicker").classList.remove("open");
  renderAllPanels(currentGroup, currentHotel);
});

// Day tab switching
document.getElementById("dayTabs").addEventListener("click", function(e) {
  var btn = e.target.closest(".day-tab");
  if (!btn) return;

  document.querySelectorAll(".day-tab").forEach(function(t) { t.classList.remove("active"); });
  btn.classList.add("active");

  var day = parseInt(btn.dataset.day);

  document.querySelectorAll(".day-panel").forEach(function(p) {
    if (parseInt(p.dataset.day) === day) {
      p.classList.add("active");
      // Re-trigger animation
      p.style.animation = "none";
      p.offsetHeight;
      p.style.animation = "";
    } else {
      p.classList.remove("active");
    }
  });

  updateIndicator(btn);
});

// Recalculate indicator on resize
window.addEventListener("resize", function() {
  var activeTab = document.querySelector(".day-tab.active");
  if (activeTab) updateIndicator(activeTab);
});

/* ================================================================
   Bootstrap
   ================================================================ */
initHero();
initHotelPicker();
initDayTabs();
renderAllPanels(currentGroup, currentHotel);

</script>
